<!DOCTYPE html>
<html lang="uk" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link data-mgx-overview="icon" rel="icon" href="https://public-frontend-1300249583.cos.ap-nanjing.myqcloud.com/commonfile/DefaultAppLogo.png" />
    <title data-mgx-overview="title">FitApp</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <meta data-mgx-overview="description" name="description" content="Розумний трекер тренувань з адаптивними рекомендаціями ваги та детекцією плато." />
    <meta data-mgx-overview="og:title" property="og:title" content="Розумний трекер тренувань" />
    <meta data-mgx-overview="og:description" property="og:description" content="Розумний трекер тренувань з адаптивними рекомендаціями ваги та детекцією плато." />
    <meta data-mgx-overview="og:image" property="og:image" content="https://public-frontend-1300249583.cos.ap-nanjing.myqcloud.com/commonfile/DefaultAppLogo.png" />
    <meta data-mgx-overview="twitter:title" name="twitter:title" content="Розумний трекер тренувань" />
    <meta data-mgx-overview="twitter:description" name="twitter:description" content="Розумний трекер тренувань з адаптивними рекомендаціями ваги та детекцією плато." />
    <meta data-mgx-overview="twitter:image" name="twitter:image" content="https://public-frontend-1300249583.cos.ap-nanjing.myqcloud.com/commonfile/DefaultAppLogo.png" />
</head>

<body>
    <div class="app-bg"></div>
    <div class="app-container">
        <!-- Deload Banner -->
        <div class="deload-banner glass-panel" id="deload-banner" style="display:none;">
            <span class="deload-icon">🔻</span>
            <span class="deload-text">Тиждень розвантаження ваги -20%</span>
        </div>

        <!-- Readiness Badge -->
        <div class="readiness-badge glass-panel" id="readiness-badge" style="display:none;">
            <span class="readiness-icon">⚡</span>
            <span class="readiness-text" id="readiness-text">Самопочуття: —</span>
        </div>

        <!-- Header -->
        <header class="header glass-panel">
            <div class="header-left">
                <h1 class="logo">💪 FitApp</h1>
            </div>
            <div class="header-right">
                <button class="btn btn-icon" id="btn-tonnage" title="Тоннаж">
                    <span class="btn-emoji">📈</span>
                </button>
                <button class="btn btn-icon" id="btn-history" title="Історія">
                    <span class="btn-emoji">📊</span>
                </button>
                <button class="btn btn-icon" id="btn-csv" title="Завантажити CSV">
                    <span class="btn-emoji">📥</span>
                </button>
                <button class="btn btn-icon" id="btn-reset" title="Скинути день">
                    <span class="btn-emoji">🔄</span>
                </button>
                <button class="btn btn-icon" id="btn-theme" title="Змінити тему">
                    <span class="btn-emoji" id="theme-icon">🌙</span>
                </button>
            </div>
        </header>

        <!-- Day Tabs -->
        <nav class="day-tabs glass-panel">
            <button class="tab-btn active" data-day="day1">День 1<span class="tab-sub">Ноги та плечі</span></button>
            <button class="tab-btn" data-day="day2">День 2<span class="tab-sub">Груди та біцепс</span></button>
            <button class="tab-btn" data-day="day3">День 3<span class="tab-sub">Спина та трицепс</span></button>
        </nav>

        <!-- Progress Bar -->
        <div class="progress-section glass-panel">
            <div class="progress-label">
                <span>Прогрес дня</span>
                <span id="progress-text">0 / 8</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <!-- Exercise Cards -->
        <main class="exercises-grid" id="exercises-grid">
            <!-- Cards rendered by JS -->
        </main>

        <!-- History Modal -->
        <div class="modal-overlay" id="modal-overlay">
            <div class="modal glass-panel" id="modal">
                <div class="modal-header">
                    <h2 id="modal-title">📊 Історія тренувань</h2>
                    <button class="btn btn-icon modal-close" id="modal-close">
                        <span class="btn-emoji">✕</span>
                    </button>
                </div>
                <div class="modal-body" id="modal-body">
                    <!-- Content rendered by JS -->
                </div>
            </div>
        </div>

        <!-- Readiness Check Modal -->
        <div class="modal-overlay" id="readiness-overlay">
            <div class="modal glass-panel readiness-modal" id="readiness-modal">
                <div class="modal-header">
                    <h2>⚡ Перевірка готовності</h2>
                </div>
                <div class="modal-body readiness-body">
                    <p class="readiness-description">Оцініть свій стан перед тренуванням</p>

                    <div class="readiness-question">
                        <label class="readiness-label">😴 Як ви спали? (1 — погано, 5 — відмінно)</label>
                        <div class="readiness-buttons" id="sleep-buttons">
                            <button class="readiness-btn" data-value="1">1</button>
                            <button class="readiness-btn" data-value="2">2</button>
                            <button class="readiness-btn" data-value="3">3</button>
                            <button class="readiness-btn" data-value="4">4</button>
                            <button class="readiness-btn" data-value="5">5</button>
                        </div>
                    </div>

                    <div class="readiness-question">
                        <label class="readiness-label">😰 Рівень стресу (1 — низький, 5 — високий)</label>
                        <div class="readiness-buttons" id="stress-buttons">
                            <button class="readiness-btn" data-value="1">1</button>
                            <button class="readiness-btn" data-value="2">2</button>
                            <button class="readiness-btn" data-value="3">3</button>
                            <button class="readiness-btn" data-value="4">4</button>
                            <button class="readiness-btn" data-value="5">5</button>
                        </div>
                    </div>

                    <button class="btn btn-primary readiness-submit" id="readiness-submit" disabled>Почати тренування</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./script.js"></script>
</body>

</html>
